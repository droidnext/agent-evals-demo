# Scenario definitions for multi-turn agent testing.
#
# Each scenario references a JSON file with per-turn definitions.
# Turns support an optional "tool_calls_expected" object for evaluating
# tool usage from captured traces. Available fields:
#
#   tool_calls_expected:
#     required:    [list]  At least these tools must be called (subset check).
#     forbidden:   [list]  These tools must NOT be called (exclusion check).
#     exact:       [list]  Exactly these tools, in this order (strict match).
#                          Overrides "required" when set.
#     max_calls:   int     Total tool invocations must not exceed this count.
#     none:        bool    If true, no tools should be called (context-reuse turn).
#
# Examples:
#   {"tool_calls_expected": {"required": ["search_cruises"]}}
#   {"tool_calls_expected": {"required": ["search_cruises"], "forbidden": ["escalate_to_human"], "max_calls": 5}}
#   {"tool_calls_expected": {"exact": ["transfer_to_agent", "search_cruises"]}}
#   {"tool_calls_expected": {"none": true}}
#
# Token usage is NOT configured here — it is model-dependent and extracted
# directly from trace spans (attributes.llm.token_count.*) at eval time.
#
# ── Using reports to improve the agent ──────────────────────────────
#
# test_scenarios.py writes execution reports to tests/reports/:
#   exec_<timestamp>.md   — human-readable Markdown
#   exec_<timestamp>.json — machine-readable, diff-friendly
#
# Use these reports to identify and fix agent issues:
#
#   Routing problems
#     The Sub-Agent Distribution table shows which sub-agents handled
#     each turn. If one agent handles everything (e.g. ItinerarySearchAgent
#     for all 10 turns), the root agent's transfer instructions need
#     tuning — update agents/cruise_booking/prompts/root_agent.yaml.
#
#   Slow turns
#     The per-turn timing column highlights latency spikes. Common
#     causes: unnecessary tool calls, large SQL result sets, or
#     redundant LLM round-trips. Cross-reference with traces in
#     .traces_local/ for the full span breakdown.
#
#   Wrong or missing tool usage
#     Compare the "Sub-Agents" and tool_calls_expected fields. If the
#     agent used search_cruises when get_pricing_info was expected,
#     refine the sub-agent's instruction prompt or the root agent's
#     transfer logic.
#
#   Response quality
#     The collapsible "Full responses" section lets you read every
#     agent reply. Pair with evals/tests/scenarios_llm_judge.py
#     (which writes to evals/reports/) for automated pass/fail scoring.
#
#   Regression tracking
#     Keep reports across runs to compare. The JSON format is stable
#     and diff-friendly — track sub-agent distribution, timing, and
#     response lengths over time as you iterate on prompts and tools.

app_name: cruise_booking
user_id: test_user

scenarios:
  - title: "Search and Book Flow"
    description: >
      User searches for a cruise, narrows down options, asks about pricing,
      and proceeds toward booking. Tests the full funnel from discovery
      through purchase intent across search, pricing, and itinerary sub-agents.
    file: search_and_book.json
  # prepend_session_id: search_book  — optional prefix for the session ID

  - title: "Destination Comparison"
    description: >
      User compares Caribbean vs Mediterranean cruises, asks follow-up
      questions about each, then picks one. Tests the recommendation
      sub-agent's ability to maintain comparison context across turns.
    file: destination_comparison.json

